<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saint DAC | Speech Architect v2.1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="app-container">
        <header class="app-header">
            <div class="logo">
                <span class="logo-saint">SAINT</span><span class="logo-dac">DAC</span>
            </div>
            <div class="header-controls">
                <div class="speaker-selector glass">
                    <button id="btn-brian" class="speaker-btn active" onclick="setSpeaker('Brian')">BRIAN</button>
                    <button id="btn-pamela" class="speaker-btn" onclick="setSpeaker('Pamela')">PAMELA</button>
                </div>
                <div class="lang-selector">
                    <button id="btn-es" class="lang-btn active" onclick="setLanguage('es')">ES</button>
                    <button id="btn-pt" class="lang-btn" onclick="setLanguage('pt')">PT</button>
                </div>
            </div>
        </header>

        <section class="config-panel glass">
            <div class="input-row">
                <div class="input-group">
                    <label for="prospect-person">Nombre de la Persona</label>
                    <input type="text" id="prospect-person" placeholder="Luis, Bruno... (Vacío = Filtro)" oninput="generateAll()">
                </div>
                <div class="input-group">
                    <label for="prospect-brand">Nombre de la Marca</label>
                    <input type="text" id="prospect-brand" placeholder="Empresa..." oninput="generateAll()">
                </div>
                <div class="input-group">
                    <label for="prospect-niche">Nicho / Rubro</label>
                    <input type="text" id="prospect-niche" placeholder="Construtora, Estética..." oninput="generateAll()">
                </div>
                <div class="input-group">
                    <label for="prospect-outcome">Cliente High-Ticket</label>
                    <input type="text" id="prospect-outcome" placeholder="Inversores, Pacientes..." oninput="generateAll()">
                </div>
            </div>
            <div class="toggle-row">
                <label>¿TIENE SITIO WEB ACTUALMENTE?</label>
                <div class="site-toggle glass">
                    <button id="btn-site-yes" class="toggle-btn active" onclick="setHasSite(true)">SÍ TIENE</button>
                    <button id="btn-site-no" class="toggle-btn" onclick="setHasSite(false)">NO TIENE</button>
                </div>
            </div>
        </section>

        <nav class="tab-nav">
            <button class="tab-btn active" onclick="showTab('cold-call')">Fase 1: Llamada Frío</button>
            <button class="tab-btn" onclick="showTab('stage-2')">Fase 2: El Cierre</button>
            <button class="tab-btn" onclick="showTab('whatsapp')">WhatsApp</button>
            <button class="tab-btn" onclick="showTab('rebuttals')">Objeciones</button>
        </nav>

        <section id="tab-cold-call" class="tab-content active">
            <div class="output-card glass single-card">
                <div class="card-header">
                    <h3 id="cc-title">Escenario: Llamada en Frío</h3>
                    <button class="copy-btn" onclick="copyText('cc-output')">Copiar</button>
                </div>
                <div id="cc-output" class="script-content"></div>
            </div>
        </section>

        <section id="tab-stage-2" class="tab-content">
            <div class="output-card glass single-card">
                <div class="card-header">
                    <h3>Script: Durante la Llamada (Cierre)</h3>
                    <button class="copy-btn" onclick="copyText('stage-2-output')">Copiar</button>
                </div>
                <div id="stage-2-output" class="script-content"></div>
            </div>
        </section>

        <section id="tab-whatsapp" class="tab-content">
            <div class="output-card glass single-card">
                <div class="card-header">
                    <h3 id="wa-title">Escenario: Mensaje de WhatsApp</h3>
                    <button class="copy-btn" onclick="copyText('wa-output')">Copiar</button>
                </div>
                <div id="wa-output" class="script-content"></div>
            </div>
        </section>

        <section id="tab-rebuttals" class="tab-content">
            <div class="search-container glass">
                <input type="text" id="objection-search" placeholder="Busca por palabra clave..." oninput="filterObjections()">
            </div>
            <div id="rebuttals-container" class="rebuttals-accordion"></div>
        </section>

        <footer class="app-footer">
            <p>Sistema de Nick | Saint DAC Studio &copy; 2026</p>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
